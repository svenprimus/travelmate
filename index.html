<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Travelmate</title>

        <link rel="icon" type="image/x-icon" href="./assets/icons/favicon.png" />
        <link rel="stylesheet" href="./styles/variables.css" />
        <link rel="stylesheet" href="./styles/standard.css" />
        <link rel="stylesheet" href="./styles/fonts.css" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <!-- #region header -->
        <header>
            <nav>
                <!-- IMPORTANT: href must be "..index.html" if current HTML is located in ./page -->
                <a href="index.html">
                    <img src="./assets/icons/favicon.png" alt="logo-icon" />
                </a>
                <ul>
                    <!-- IMPORTANT: href links must be relative to current HTML file -->
                    <li>
                        <!-- TODO: #section-highlights not yet defined -->
                        <a href="#section-highlights">
                            <img class="nav-mobile" src="./assets/icons/mobile-home-icon.svg" alt="home button" />
                            <div class="nav-desktop">
                                <p>Highlights</p>
                                <img class="hover0" src="./assets/icons/hover-0.png" alt="hover-0" />
                            </div>
                        </a>
                    </li>
                    <li>
                        <a href="./page/beaches.html">
                            <img class="nav-mobile" src="./assets/icons/mobile-rocket-icon.svg" alt="rocket button" />
                            <div class="nav-desktop">
                                <p>Article 1</p>
                                <img class="hover1" src="./assets/icons/hover-1.png" alt="hover-1" />
                            </div>
                        </a>
                    </li>
                    <li>
                        <a href="./page/copenhagen.html">
                            <img class="nav-mobile" src="./assets/icons/mobile-help-icon.svg" alt="help button" />
                            <div class="nav-desktop">
                                <p>Article 2</p>
                                <img class="hover2" src="./assets/icons/hover-2.png" alt="hover-2" />
                            </div>
                        </a>
                    </li>
                    <li>
                        <a href="./page/pattaya.html">
                            <img class="nav-mobile" src="./assets/icons/mobile-contact-icon.svg" alt="contact button" />
                            <div class="nav-desktop">
                                <p>Article 3</p>
                                <img class="hover3" src="./assets/icons/hover-3.png" alt="hover-3" />
                            </div>
                        </a>
                    </li>
                </ul>
            </nav>
        </header>
        <!-- #endregion header -->

        <!-- #region content-main -->
        <section class="content-main">
            <!-- placeholder to test content limit -->
            <section class="content-main-landing">
                <div>
                    <h1>Cappadocia</h1>
                </div>
            </section>
            <div class="content-placeholder">
                <div></div>
            </div>
        </section>
        <!-- #endregion content-main -->

        <!-- #region footer -->
        <footer>
            <div class="footer-copyright">
                <div>
                    <ul>
                        <li>
                            <a href="./page/imprint.html"> <p>Imprint</p></a>
                        </li>
                        <li class="cookies">
                            <p>Cookie Preferences</p>
                        </li>
                        <li class="copyright">
                            <img src="./assets/icons/copyright-icon.svg" alt="copyright-icon" />
                            <p>Travel Blog 2026</p>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="footer-social">
                <a href="https://www.tiktok.com/de-DE/">
                    <img class="tiktok" src="./assets/icons/socials-tiktok-icon.svg" alt="tiktok-icon"
                /></a>
                <a href="https://www.youtube.com/">
                    <img class="youtube" src="./assets/icons/socials-youtube-icon.svg" alt="youtube-icon"
                /></a>
                <a href="https://www.facebook.com/">
                    <img class="facebook" src="./assets/icons/socials-facebook-icon.svg" alt="facebook-icon"
                /></a>
                <a href="https://www.instagram.com/">
                    <img src="./assets/icons/socials-instagram-icon.svg" alt="instagram-icon"
                /></a>
            </div>
        </footer>
        <!-- #endregion footer -->
    </body>
</html>
